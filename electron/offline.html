<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EasyMarket - Connexion indisponible</title>
    <style>
        :root { --primary:#2f7d69; --ink:#17211b; --muted:#52635b; --line:#dfe7e2; --gold:#f5b84b; --paper:#f7fbf9; }
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--paper); color:var(--ink); font-family:Arial, sans-serif; }
        main { width:min(460px, calc(100% - 32px)); background:white; border:1px solid var(--line); border-radius:12px; padding:28px; text-align:center; box-shadow:0 22px 60px rgba(23,33,27,.10); }
        img { width:62px; height:62px; object-fit:contain; margin-bottom:14px; }
        h1 { margin:0 0 10px; font-size:28px; }
        p { margin:0 0 18px; color:var(--muted); line-height:1.55; }
        button { min-height:44px; border:0; border-radius:8px; background:var(--gold); color:#10251f; font-weight:700; padding:0 18px; cursor:pointer; }
    </style>
</head>
<body>
    <main>
        <img src="../public/icons/logo.png" alt="EasyMarket">
        <h1>Connexion indisponible</h1>
        <p>EasyMarket n'arrive pas à ouvrir la page de connexion. Vérifiez votre connexion internet ou que le serveur EasyMarket est démarré.</p>
        <button type="button" onclick="location.reload()">Réessayer</button>
    </main>
</body>
</html>
